syntax = "proto3";

package edge.scheduling.v1;

option go_package = "edge-scheduling-engine/gen/go/edge/scheduling/v1;schedulingv1";

message HealthRequest {
  string service = 1; // "scheduler", "collector", etc.
}

message HealthResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  Status status = 1;
  string details = 2;
}

service HealthService {
  rpc Check(HealthRequest) returns (HealthResponse);
}